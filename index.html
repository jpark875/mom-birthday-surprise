<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Happy Birthday</title>
<meta name="description" content="A little birthday surprise.">

<!-- iOS Safari / "Add to Home Screen" niceties -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%81%3C/text%3E%3C/svg%3E">

<link rel="stylesheet" href="style.css">
</head>
<body>

  <main id="stage">

    <!-- The present. This is the only thing visible on load. -->
    <button type="button" id="present-btn" class="present-btn" aria-label="Tap to open your birthday surprise">
      <svg class="gift" viewBox="0 0 100 100" aria-hidden="true">
        <g class="gift-box">
          <rect class="box-body" x="16" y="44" width="68" height="46" rx="2"></rect>
          <line class="ribbon-line" x1="50" y1="44" x2="50" y2="90"></line>
          <line class="ribbon-line" x1="16" y1="67" x2="84" y2="67"></line>
        </g>
        <g class="gift-lid">
          <rect class="lid-box" x="10" y="30" width="80" height="14" rx="2"></rect>
          <line class="ribbon-line" x1="50" y1="30" x2="50" y2="44"></line>
        </g>
      </svg>
      <span class="tap-hint" lang="ko">눌러서 열기</span>
    </button>

    <!-- The reveal. Hidden until the present is opened. -->
    <div id="video-wrap">
      <!--
        ============================================================
        INSERT YOUR VIDEO FILE HERE
        1. Put your video file in this same folder (next to index.html).
        2. Replace "my-video.mp4" below with your file's name, e.g. src="mom-message.mp4"
        3. If you have it, add a poster="my-video-poster.jpg" attribute to
           the <video> tag for a nicer thumbnail before it plays.
        ============================================================
      -->
      <video
        id="birthday-video"
        src="my-video.mp4"
        playsinline
        webkit-playsinline="true"
        controls
        preload="auto">
        Your browser doesn't support embedded video.
      </video>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
